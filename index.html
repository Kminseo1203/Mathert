<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학 퀴즈</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{--bg:#f8f9fa;--white:#ffffff;--blue:#3182f6;--blue-light:#ebf3fe;--blue-dark:#1b64da;--green:#00c471;--green-light:#e5f9f1;--red:#f04452;--red-light:#fff0f1;--yellow:#ff8c00;--text-primary:#191f28;--text-secondary:#6b7684;--text-tertiary:#b0b8c1;--border:#e5e8eb;--shadow-sm:0 1px 4px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.08);--radius-sm:10px;--radius-md:16px;--radius-xl:24px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text-primary);font-family:'Pretendard',-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{max-width:480px;margin:0 auto;padding-bottom:80px;min-height:100vh;}
.nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.nav-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:50%;font-size:18px;color:var(--text-primary);transition:background 0.15s;}
.nav-back:hover{background:var(--bg);}
.stats-banner{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;}
.stat-item{flex:1;text-align:center;}
.stat-item+.stat-item{border-left:1px solid var(--border);}
.stat-label{font-size:11px;font-weight:500;color:var(--text-tertiary);margin-bottom:4px;}
.stat-value{font-size:20px;font-weight:800;color:var(--text-primary);letter-spacing:-0.5px;line-height:1;}
.stat-value.blue{color:var(--blue);}.stat-value.green{color:var(--green);}.stat-value.orange{color:var(--yellow);}
.section{padding:24px 20px 0;}
.section-label{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;}
.quick-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.chip{background:var(--white);border:1.5px solid var(--border);border-radius:999px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all 0.15s;font-family:inherit;}
.chip:hover{border-color:var(--blue);color:var(--blue);}
.grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.grade-btn{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 8px;font-family:inherit;font-size:14px;font-weight:700;color:var(--text-secondary);cursor:pointer;transition:all 0.15s;text-align:center;box-shadow:var(--shadow-sm);}
.grade-btn:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.grade-btn.selected{background:var(--blue-light);border-color:var(--blue);color:var(--blue);box-shadow:none;}
.cta-section{padding:20px 20px 0;}
.cta-btn{width:100%;background:var(--blue);border:none;border-radius:var(--radius-md);padding:18px;color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:-0.2px;box-shadow:0 4px 16px rgba(49,130,246,0.28);}
.cta-btn:hover:not(:disabled){background:var(--blue-dark);transform:translateY(-1px);}
.cta-btn:disabled{background:var(--border);color:var(--text-tertiary);box-shadow:none;cursor:not-allowed;}
.quiz-wrap{padding:20px 20px 0;}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.grade-pill{background:var(--blue-light);color:var(--blue);border-radius:999px;padding:5px 14px;font-size:12px;font-weight:700;}
.unit-text{font-size:12px;color:var(--text-tertiary);font-weight:500;}
.question-card{background:var(--white);border-radius:var(--radius-xl);padding:28px 24px 24px;box-shadow:var(--shadow-md);margin-bottom:16px;border:2px solid transparent;transition:border-color 0.3s,box-shadow 0.3s;}
.question-card.correct{border-color:var(--green);box-shadow:0 4px 20px rgba(0,196,113,0.15);}
.question-card.wrong{border-color:var(--red);box-shadow:0 4px 20px rgba(240,68,82,0.12);}
.question-num{font-size:12px;font-weight:700;color:var(--text-tertiary);margin-bottom:14px;}
.question-text{font-size:16px;font-weight:600;color:var(--text-primary);line-height:1.75;min-height:80px;letter-spacing:-0.2px;white-space:pre-wrap;}
.options-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.opt-btn{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;font-family:inherit;font-size:15px;font-weight:600;color:var(--text-primary);cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:14px;transition:all 0.15s;box-shadow:var(--shadow-sm);letter-spacing:-0.2px;line-height:1.55;}
.opt-btn:hover:not(:disabled){border-color:var(--blue);background:var(--blue-light);color:var(--blue);transform:translateY(-1px);}
.opt-btn .num{width:26px;height:26px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;transition:all 0.15s;margin-top:1px;}
.opt-btn:hover:not(:disabled) .num{background:var(--blue);color:#fff;}
.opt-btn.sel-correct{border-color:var(--green);background:var(--green-light);color:#007a47;}
.opt-btn.sel-correct .num{background:var(--green);color:#fff;}
.opt-btn.sel-wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}
.opt-btn.sel-wrong .num{background:var(--red);color:#fff;}
.opt-btn.show-correct{border-color:var(--green);background:var(--green-light);color:#007a47;}
.opt-btn.show-correct .num{background:var(--green);color:#fff;}
.opt-btn:disabled{cursor:not-allowed;}
.input-row{display:flex;gap:10px;margin-bottom:16px;}
.ans-input{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;font-family:inherit;font-size:16px;font-weight:700;color:var(--text-primary);outline:none;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:var(--shadow-sm);}
.ans-input::placeholder{color:var(--text-tertiary);font-weight:500;}
.ans-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,0.12);}
.ans-input.correct{border-color:var(--green);color:#007a47;}
.ans-input.wrong{border-color:var(--red);color:var(--red);}
.confirm-btn{background:var(--blue);border:none;border-radius:var(--radius-md);padding:16px 22px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.confirm-btn:hover:not(:disabled){background:var(--blue-dark);}
.confirm-btn:disabled{background:var(--border);color:var(--text-tertiary);cursor:not-allowed;}
.sym-pad{display:none;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.sym-pad.show{display:flex;}
.sym-btn{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:14px;font-weight:700;color:var(--text-primary);cursor:pointer;transition:all 0.15s;min-width:44px;text-align:center;}
.sym-btn:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue);}
.sym-btn.del{color:var(--red);border-color:var(--border);}
.sym-btn.del:hover{border-color:var(--red);background:var(--red-light);}

.feedback{border-radius:var(--radius-md);padding:18px 20px;margin-bottom:16px;display:none;font-size:14px;line-height:1.7;color:var(--text-secondary);}
.feedback.show{display:block;}
.feedback.correct{background:var(--green-light);}
.feedback.wrong{background:var(--red-light);}
.feedback-top{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700;margin-bottom:12px;}
.feedback.correct .feedback-top{color:#007a47;}
.feedback.wrong .feedback-top{color:var(--red);}
.feedback-answer{font-size:13px;font-weight:600;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);color:var(--text-primary);}
.steps{display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
.step{display:flex;gap:12px;align-items:flex-start;}
.step-num{min-width:24px;height:24px;border-radius:7px;background:rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--text-secondary);flex-shrink:0;margin-top:1px;}
.step-body{flex:1;}
.step-title{font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:2px;}
.step-calc{font-size:14px;font-weight:700;color:var(--text-primary);font-family:monospace;background:rgba(0,0,0,0.04);padding:4px 8px;border-radius:6px;display:inline-block;margin-bottom:2px;}
.step-desc{font-size:12px;color:var(--text-tertiary);line-height:1.5;}
.concept-box{margin-top:12px;padding:10px 14px;background:rgba(49,130,246,0.07);border-radius:10px;border-left:3px solid var(--blue);}
.concept-box .concept-label{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px;}
.concept-box .concept-text{font-size:13px;color:var(--text-secondary);}
.action-row{display:flex;gap:10px;padding:0 20px;margin-top:4px;}
.action-next{flex:1;background:var(--blue);border:none;border-radius:var(--radius-md);padding:18px;color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;display:none;box-shadow:0 4px 14px rgba(49,130,246,0.25);}
.action-next:hover{background:var(--blue-dark);transform:translateY(-1px);}
.action-back{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:18px;color:var(--text-secondary);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.action-back:hover{border-color:var(--blue);color:var(--blue);}
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--text-primary);color:#fff;border-radius:999px;padding:10px 22px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:480px){.grade-grid{grid-template-columns:repeat(3,1fr);}}

.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99;}
.tab-btn{flex:1;padding:14px;font-family:inherit;font-size:14px;font-weight:600;color:var(--text-tertiary);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.ranking-wrap{padding:20px;}
.ranking-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ranking-title{font-size:16px;font-weight:700;}
.refresh-btn{background:none;border:1.5px solid var(--border);border-radius:999px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all 0.15s;}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue);}
.rank-card{background:var(--white);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);}
.rank-card.me{border-color:var(--blue);background:var(--blue-light);}
.rank-num{font-size:18px;font-weight:800;width:28px;text-align:center;flex-shrink:0;}
.rank-num.gold{color:#f5a623;}.rank-num.silver{color:#9b9b9b;}.rank-num.bronze{color:#c87533;}
.rank-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.rank-avatar-placeholder{width:36px;height:36px;border-radius:50%;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:14px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rank-stats{font-size:12px;color:var(--text-tertiary);}
.rank-score{font-size:18px;font-weight:800;color:var(--blue);}
.empty-ranking{text-align:center;padding:48px 20px;color:var(--text-tertiary);font-size:14px;}
.profile-wrap{padding:20px;}
.profile-card{background:var(--white);border-radius:var(--radius-xl);padding:28px 24px;box-shadow:var(--shadow-md);margin-bottom:16px;text-align:center;}
.profile-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 12px;}
.profile-avatar-placeholder{width:72px;height:72px;border-radius:50%;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 12px;}
.profile-name{font-size:20px;font-weight:800;margin-bottom:4px;}
.profile-email{font-size:13px;color:var(--text-tertiary);margin-bottom:20px;}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.profile-stat{background:var(--bg);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;}
.profile-stat-val{font-size:22px;font-weight:800;color:var(--blue);margin-bottom:4px;}
.profile-stat-label{font-size:11px;color:var(--text-tertiary);font-weight:500;}
.records-title{font-size:14px;font-weight:700;margin-bottom:12px;}
.record-item{background:var(--white);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.record-grade{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:2px;}
.record-date{font-size:11px;color:var(--text-tertiary);}
.record-score{font-size:16px;font-weight:800;}
.record-acc{font-size:11px;color:var(--text-tertiary);}

.admin-wrap{padding:20px;}
.admin-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.admin-card{background:var(--white);border-radius:var(--radius-md);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);}
.admin-user-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.admin-user-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.admin-user-placeholder{width:36px;height:36px;border-radius:50%;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.admin-user-name{font-size:14px;font-weight:700;}
.admin-user-email{font-size:12px;color:var(--text-tertiary);}
.admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.admin-stat{background:var(--bg);border-radius:8px;padding:8px;text-align:center;}
.admin-stat-val{font-size:14px;font-weight:800;color:var(--blue);}
.admin-stat-label{font-size:10px;color:var(--text-tertiary);}
.admin-records{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.admin-records-title{font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;}
.admin-record-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}


.ban-overlay{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:40px;text-align:center;}
.ban-overlay-icon{font-size:64px;margin-bottom:20px;}
.ban-overlay-title{font-size:24px;font-weight:800;color:var(--red);margin-bottom:12px;}
.ban-overlay-reason{font-size:15px;color:var(--text-secondary);margin-bottom:8px;line-height:1.6;}
.ban-overlay-exp{font-size:13px;color:var(--text-tertiary);}
.ban-btn{background:var(--red-light);border:1.5px solid var(--red);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:700;color:var(--red);cursor:pointer;transition:all 0.15s;}
.ban-btn:hover{background:var(--red);color:#fff;}
.unban-btn{background:var(--green-light);border:1.5px solid var(--green);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:700;color:var(--green);cursor:pointer;transition:all 0.15s;}
.unban-btn:hover{background:var(--green);color:#fff;}
.ban-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.ban-modal-box{background:var(--white);border-radius:var(--radius-xl);padding:28px 24px;width:100%;max-width:400px;}
.ban-modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.ban-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:inherit;font-size:14px;color:var(--text-primary);outline:none;margin-bottom:10px;}
.ban-input:focus{border-color:var(--blue);}
.ban-select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:inherit;font-size:14px;color:var(--text-primary);outline:none;margin-bottom:10px;}
.ban-modal-btns{display:flex;gap:8px;margin-top:16px;}
.ban-list-section{margin-top:20px;}
.ban-list-title{font-size:14px;font-weight:700;margin-bottom:10px;}
.ban-item{background:var(--red-light);border:1.5px solid var(--red);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.ban-item-info{font-size:13px;}
.ban-item-name{font-weight:700;color:var(--red);}
.ban-item-detail{font-size:11px;color:var(--text-tertiary);}
.logout-btn{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:16px;color:var(--red);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:8px;}
.logout-btn:hover{border-color:var(--red);background:var(--red-light);}
.login-prompt{text-align:center;padding:48px 24px;}
.login-prompt-icon{font-size:48px;margin-bottom:16px;}
.login-prompt-title{font-size:18px;font-weight:800;margin-bottom:8px;}
.login-prompt-desc{font-size:14px;color:var(--text-secondary);margin-bottom:24px;line-height:1.6;}
.login-btn{background:var(--white);border:1.5px solid var(--border);border-radius:999px;padding:6px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.login-btn:hover{border-color:var(--blue);color:var(--blue);}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:999px;padding:5px 12px 5px 6px;cursor:pointer;}
.user-chip img{width:24px;height:24px;border-radius:50%;}
.user-chip span{font-size:13px;font-weight:600;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <button class="nav-back" id="nav-back" onclick="goSetup()" style="visibility:hidden">←</button>
    <span class="nav-title">수학 퀴즈</span>
    <div id="auth-area"></div>
  </nav>
  <div class="stats-banner">
    <div class="stat-item"><div class="stat-label">점수</div><div class="stat-value blue" id="score-val">0</div></div>
    <div class="stat-item"><div class="stat-label">🔥 연속</div><div class="stat-value orange" id="streak-val">0</div></div>
    <div class="stat-item"><div class="stat-label">정답률</div><div class="stat-value green" id="rate-val">—</div></div>
    <div class="stat-item"><div class="stat-label">문제 수</div><div class="stat-value" id="total-val">0</div></div>
  </div>
  <div class="tabs" id="main-tabs">
    <button class="tab-btn active" onclick="showTab('quiz')">퀴즈</button>
    <button class="tab-btn" onclick="showTab('ranking')">🏆 랭킹</button>
    <button class="tab-btn" onclick="showTab('profile')">내 기록</button>
    <button class="tab-btn" id="admin-tab-btn" style="display:none" onclick="showTab('admin')">🔧 관리</button>
  </div>

  <div id="tab-quiz">
  <div id="setup-screen">
    <div class="section">
      <div class="section-label">빠른 선택</div>
      <div class="quick-row">
        <button class="chip" onclick="selectRange('elem')">초등 전체</button>
        <button class="chip" onclick="selectRange('mid')">중학교 전체</button>
        <button class="chip" onclick="selectRange('high')">고등학교 전체</button>
        <button class="chip" onclick="selectRange('all')">전체</button>
        <button class="chip" onclick="selectRange('none')">초기화</button>
      </div>
      <div class="section-label">학년 선택 <span id="sel-count" style="color:var(--blue);font-weight:800"></span></div>
      <div class="grade-grid" id="grade-grid"></div>
    </div>
    <div class="cta-section">
      <button class="cta-btn" id="start-btn" onclick="startQuiz()" disabled>문제 시작하기</button>
    </div>
  </div>

<script>
// ── 상수 ──────────────────────────────────────────────────────────
const GRADES=[
  {id:'e1',label:'초1'},{id:'e2',label:'초2'},{id:'e3',label:'초3'},
  {id:'e4',label:'초4'},{id:'e5',label:'초5'},{id:'e6',label:'초6'},
  {id:'m1',label:'중1'},{id:'m2',label:'중2'},{id:'m3',label:'중3'},
  {id:'h1',label:'고1'},{id:'h2',label:'고2'},{id:'h3',label:'고3'},
];
const RANGE={elem:['e1','e2','e3','e4','e5','e6'],mid:['m1','m2','m3'],high:['h1','h2','h3'],all:GRADES.map(g=>g.id),none:[]};

// ── 상태 ──────────────────────────────────────────────────────────
let selected=new Set(),score=0,streak=0,total=0,correct=0,qNum=0;
let curAnswer=null,curType='mcq',curFeedback=null;
let authToken=localStorage.getItem('auth_token')||null;
let currentUser=null;
const API='https://mathert.pages.dev';

// ── 유틸 ──────────────────────────────────────────────────────────
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndNZ(a,b){let v;do{v=rnd(a,b);}while(v===0);return v;}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;}
function lcm(a,b){return Math.abs(a*b)/gcd(a,b);}
function comb(n,r){if(r>n||r<0)return 0;if(r===0||r===n)return 1;let res=1;for(let i=0;i<Math.min(r,n-r);i++){res=res*(n-i)/(i+1);}return Math.round(res);}
function simplify(n,d){const g=gcd(Math.abs(n),Math.abs(d));return[n/g,d/g];}

// ── 문제 생성기 ───────────────────────────────────────────────────
// 각 생성기는 {question, answer, unit, steps, concept, type} 반환
// steps: [{title, calc, desc}]

const GENERATORS = {

  // ════════════════════════════════════════
  // 초등학교
  // ════════════════════════════════════════

  e1: () => {
    const type = rnd(1,3);
    if(type===1){
      // 받아올림 없는 덧셈
      const a=rnd(1,9),b=rnd(1,9-a);
      const ans=a+b;
      return {
        question:`사탕이 ${a}개 있었는데 친구에게 ${b}개를 더 받았습니다. 사탕은 모두 몇 개인가요?`,
        answer:`${ans}`,unit:'덧셈',type:'short',
        steps:[
          {title:'주어진 수 확인',calc:`${a} + ${b}`,desc:`처음 ${a}개에 ${b}개를 더합니다.`},
          {title:'계산',calc:`${a} + ${b} = ${ans}`,desc:`두 수를 더하면 ${ans}입니다.`},
        ],
        concept:'합계를 구할 때는 두 수를 더합니다.'
      };
    } else if(type===2){
      // 뺄셈
      const b=rnd(1,8),a=rnd(b+1,9);
      const ans=a-b;
      return {
        question:`구슬이 ${a}개 있었는데 ${b}개를 잃어버렸습니다. 남은 구슬은 몇 개인가요?`,
        answer:`${ans}`,unit:'뺄셈',type:'short',
        steps:[
          {title:'주어진 수 확인',calc:`${a} - ${b}`,desc:`처음 ${a}개에서 ${b}개를 뺍니다.`},
          {title:'계산',calc:`${a} - ${b} = ${ans}`,desc:`빼면 ${ans}개가 남습니다.`},
        ],
        concept:'남은 양을 구할 때는 큰 수에서 작은 수를 뺍니다.'
      };
    } else {
      // 빈칸 채우기
      const a=rnd(1,5),b=rnd(1,5);
      return {
        question:`□ 안에 알맞은 수를 구하세요.\n${a} + □ = ${a+b}`,
        answer:`${b}`,unit:'빈칸 채우기',type:'short',
        steps:[
          {title:'관계 파악',calc:`${a} + □ = ${a+b}`,desc:`${a}에 어떤 수를 더하면 ${a+b}가 됩니다.`},
          {title:'역산',calc:`${a+b} - ${a} = ${b}`,desc:`전체에서 알고 있는 수를 빼면 모르는 수를 구할 수 있습니다.`},
        ],
        concept:'□ = 전체 - 한쪽'
      };
    }
  },

  e2: () => {
    const type = rnd(1,3);
    if(type===1){
      const a=rnd(10,50),b=rnd(10,50);
      const ans=a+b;
      return {
        question:`문구점에서 연필 ${a}자루와 볼펜 ${b}자루를 샀습니다. 모두 몇 자루를 샀나요?`,
        answer:`${ans}`,unit:'두 자리 수 덧셈',type:'short',
        steps:[
          {title:'일의 자리 계산',calc:`${a%10} + ${b%10} = ${(a%10)+(b%10)}`,desc:'일의 자리끼리 더합니다.'+(((a%10)+(b%10))>=10?' 10 이상이면 십의 자리로 올림합니다.':'')},
          {title:'십의 자리 계산',calc:`${Math.floor(a/10)} + ${Math.floor(b/10)}${(a%10+b%10)>=10?` + 1(올림)`:''} = ${Math.floor(ans/10)}`,desc:'십의 자리끼리 더합니다.'},
          {title:'결과',calc:`${a} + ${b} = ${ans}`,desc:`합계는 ${ans}자루입니다.`},
        ],
        concept:'두 자리 수 덧셈 시 자리값을 맞춰 더합니다.'
      };
    } else if(type===2){
      const b=rnd(10,40),a=rnd(b+10,80);
      const ans=a-b;
      return {
        question:`줄넘기를 ${a}번 했다가 ${b}번 틀렸습니다. 성공한 횟수는 몇 번인가요?`,
        answer:`${ans}`,unit:'두 자리 수 뺄셈',type:'short',
        steps:[
          {title:'일의 자리 계산',calc:`${a%10} - ${b%10}${a%10<b%10?' (받아내림 필요)':''}`,desc:a%10<b%10?`일의 자리가 작으므로 십의 자리에서 10을 받아내립니다.`:`일의 자리끼리 뺍니다.`},
          {title:'결과',calc:`${a} - ${b} = ${ans}`,desc:`성공한 횟수는 ${ans}번입니다.`},
        ],
        concept:'뺄셈에서 위의 수가 작으면 윗 자리에서 받아내림합니다.'
      };
    } else {
      const a=rnd(2,5),b=rnd(2,6);
      const ans=a*b;
      return {
        question:`사탕을 한 봉지에 ${a}개씩 ${b}봉지 샀습니다. 사탕은 모두 몇 개인가요?`,
        answer:`${ans}`,unit:'곱셈 기초',type:'short',
        steps:[
          {title:'반복 덧셈으로 이해',calc:`${Array(b).fill(a).join(' + ')} = ${ans}`,desc:`${a}를 ${b}번 더한 것과 같습니다.`},
          {title:'곱셈 적용',calc:`${a} × ${b} = ${ans}`,desc:`${a}의 ${b}배는 ${ans}입니다.`},
        ],
        concept:'곱셈은 같은 수를 반복해서 더하는 것의 줄임입니다.'
      };
    }
  },

  e3: () => {
    const type = rnd(1,4);
    if(type===1){
      const a=rnd(2,9),b=rnd(2,9);
      const ans=a*b;
      return {
        question:`한 줄에 ${a}명씩 ${b}줄로 서 있습니다. 모두 몇 명인가요?`,
        answer:`${ans}`,unit:'곱셈구구',type:'short',
        steps:[
          {title:'곱셈식 세우기',calc:`${a} × ${b}`,desc:`${a}명씩 ${b}줄이므로 ${a} × ${b}입니다.`},
          {title:'${a}단 곱셈구구',calc:`${a} × ${b} = ${ans}`,desc:`${a}의 ${b}배는 ${ans}입니다.`},
        ],
        concept:`${a}단: ${a} × 1 = ${a}, ${a} × 2 = ${a*2}, ... ${a} × ${b} = ${ans}`
      };
    } else if(type===2){
      const b=rnd(2,9),q=rnd(2,9),ans=b*q;
      return {
        question:`사과 ${ans}개를 ${b}명이 똑같이 나누면 한 명이 몇 개씩 받나요?`,
        answer:`${q}`,unit:'나눗셈',type:'short',
        steps:[
          {title:'나눗셈식 세우기',calc:`${ans} ÷ ${b}`,desc:`${ans}개를 ${b}명이 나눕니다.`},
          {title:'곱셈구구 이용',calc:`${b} × ? = ${ans} → ? = ${q}`,desc:`${b}단에서 ${ans}가 되는 수를 찾습니다.`},
          {title:'결과',calc:`${ans} ÷ ${b} = ${q}`,desc:`한 명이 ${q}개씩 받습니다.`},
        ],
        concept:'나눗셈은 곱셈의 역연산입니다. a ÷ b = c ↔ b × c = a'
      };
    } else if(type===3){
      const a=rnd(100,500),b=rnd(100,400);
      const ans=a+b;
      return {
        question:`도서관에 동화책이 ${a}권, 위인전이 ${b}권 있습니다. 모두 몇 권인가요?`,
        answer:`${ans}`,unit:'세 자리 수 덧셈',type:'short',
        steps:[
          {title:'일의 자리',calc:`${a%10} + ${b%10} = ${(a%10)+(b%10)}`,desc:'일의 자리끼리 더합니다.'},
          {title:'십의 자리',calc:`${Math.floor(a/10)%10} + ${Math.floor(b/10)%10} = ${Math.floor(a/10)%10+Math.floor(b/10)%10}`,desc:'십의 자리끼리 더합니다.'},
          {title:'백의 자리',calc:`${Math.floor(a/100)} + ${Math.floor(b/100)} = ${Math.floor(a/100)+Math.floor(b/100)}`,desc:'백의 자리끼리 더합니다.'},
          {title:'결과',calc:`${a} + ${b} = ${ans}`,desc:`총 ${ans}권입니다.`},
        ],
        concept:'세 자리 수도 자리값을 맞춰 일, 십, 백의 자리 순서로 더합니다.'
      };
    } else {
      const n=rnd(1,9),ans=(n/10).toFixed(1);
      return {
        question:`색 테이프 1m를 10등분 했습니다. 그 중 ${n}조각의 길이는 몇 m인가요?`,
        answer:ans,unit:'분수와 소수',type:'short',
        steps:[
          {title:'분수로 나타내기',calc:`${n}/10`,desc:`10등분 중 ${n}조각이므로 ${n}/10입니다.`},
          {title:'소수로 변환',calc:`${n}/10 = 0.${n}`,desc:'분모가 10인 분수는 소수 한 자리로 바꿉니다.'},
          {title:'결과',calc:`${ans} m`,desc:`${ans}m입니다.`},
        ],
        concept:'1/10 = 0.1, n/10 = 0.n (소수 한 자리)'
      };
    }
  },

  e4: () => {
    const type = rnd(1,4);
    if(type===1){
      const a=rnd(10,30),b=rnd(10,30);
      const ans=a*b;
      return {
        question:`가로 ${a}cm, 세로 ${b}cm인 직사각형 모양의 화단이 있습니다. 화단의 넓이는 몇 cm²인가요?`,
        answer:`${ans}`,unit:'넓이',type:'short',
        steps:[
          {title:'직사각형 넓이 공식',calc:`넓이 = 가로 × 세로`,desc:'직사각형의 넓이는 가로와 세로의 곱입니다.'},
          {title:'계산',calc:`${a} × ${b} = ${ans}`,desc:`가로 ${a}cm × 세로 ${b}cm를 곱합니다.`},
          {title:'결과',calc:`${ans} cm²`,desc:`화단의 넓이는 ${ans}cm²입니다.`},
        ],
        concept:'직사각형 넓이 = 가로 × 세로'
      };
    } else if(type===2){
      const n1=rnd(1,4),n2=rnd(1,4),d=rnd(5,10);
      const ansN=n1+n2,ans=ansN>=d?`${Math.floor(ansN/d)} ${ansN%d!==0?`${ansN%d}/${d}`:''}`.trim():`${ansN}/${d}`;
      const [sn,sd]=simplify(n1+n2,d);
      const finalAns=sd===1?`${sn}`:`${sn}/${sd}`;
      return {
        question:`피자 한 판을 ${d}조각으로 나눴습니다. 민준이가 ${n1}조각, 수아가 ${n2}조각을 먹었습니다. 두 사람이 먹은 양은 전체의 얼마인가요?`,
        answer:finalAns,unit:'분수의 덧셈',type:'short',
        steps:[
          {title:'분수로 나타내기',calc:`${n1}/${d} + ${n2}/${d}`,desc:`민준이 ${n1}/${d}, 수아 ${n2}/${d}입니다.`},
          {title:'분모가 같으므로 분자끼리 더하기',calc:`(${n1}+${n2})/${d} = ${n1+n2}/${d}`,desc:'분모가 같을 때는 분자끼리만 더합니다.'},
          {title:'약분',calc:`${n1+n2}/${d} = ${finalAns}`,desc:gcd(n1+n2,d)>1?`최대공약수 ${gcd(n1+n2,d)}로 나눕니다.`:'이미 기약분수입니다.'},
        ],
        concept:'동분모 분수의 덧셈: a/n + b/n = (a+b)/n'
      };
    } else if(type===3){
      const b=rnd(2,9),q=rnd(10,30),a=b*q;
      return {
        question:`사탕 ${a}개를 ${b}명에게 똑같이 나눠주려 합니다. 한 명이 몇 개씩 받나요?`,
        answer:`${q}`,unit:'나눗셈',type:'short',
        steps:[
          {title:'나눗셈식 세우기',calc:`${a} ÷ ${b}`,desc:`${a}개를 ${b}명이 나눕니다.`},
          {title:'세로 나눗셈',calc:`${a} ÷ ${b} = ${q}`,desc:`${b} × ${q} = ${a}이므로 몫은 ${q}입니다.`},
          {title:'검산',calc:`${b} × ${q} = ${a} ✓`,desc:'나누는 수 × 몫 = 나누어지는 수로 검산합니다.'},
        ],
        concept:'나눗셈 검산: 나누는 수 × 몫 = 나누어지는 수'
      };
    } else {
      const s=rnd(3,12);
      return {
        question:`한 변의 길이가 ${s}cm인 정사각형이 있습니다. 이 정사각형의 넓이는 몇 cm²인가요?`,
        answer:`${s*s}`,unit:'정사각형 넓이',type:'short',
        steps:[
          {title:'정사각형 넓이 공식',calc:`넓이 = 한 변 × 한 변`,desc:'정사각형은 네 변의 길이가 모두 같습니다.'},
          {title:'계산',calc:`${s} × ${s} = ${s*s}`,desc:`${s}cm × ${s}cm입니다.`},
          {title:'결과',calc:`${s*s} cm²`,desc:`넓이는 ${s*s}cm²입니다.`},
        ],
        concept:'정사각형 넓이 = 한 변의 길이²'
      };
    }
  },

  e5: () => {
    const type = rnd(1,4);
    if(type===1){
      // 통분 후 분수 덧셈
      const d1=rnd(2,5),d2=rnd(2,5),n1=rnd(1,d1-1||1),n2=rnd(1,d2-1||1);
      const L=lcm(d1,d2);
      const nn1=n1*(L/d1),nn2=n2*(L/d2),total=nn1+nn2;
      const [sn,sd]=simplify(total,L);
      const ans=sd===1?`${sn}`:`${sn}/${sd}`;
      return {
        question:`물통에 물이 ${n1}/${d1}L 있었는데 ${n2}/${d2}L를 더 부었습니다. 물은 모두 몇 L인가요?`,
        answer:ans,unit:'분수의 덧셈(통분)',type:'short',
        steps:[
          {title:'최소공배수 구하기(통분)',calc:`lcm(${d1}, ${d2}) = ${L}`,desc:`분모 ${d1}과 ${d2}의 최소공배수는 ${L}입니다.`},
          {title:'통분하기',calc:`${n1}/${d1} = ${nn1}/${L},  ${n2}/${d2} = ${nn2}/${L}`,desc:'두 분수의 분모를 같게 만듭니다.'},

  m1: () => {

      const primes=[2,3,5,7];
      const idx1=rnd(0,3),idx2=rnd(0,3);
      const p1=primes[idx1],p2=primes[idx2===idx1?(idx1+1)%4:idx2];
      const e1=rnd(1,3),e2=rnd(1,2);
      const n=Math.pow(p1,e1)*Math.pow(p2,e2);
      // 실제 나눗셈 과정 생성
      let tmp=n, divSteps=[], divHistory=[];
      const smallPrimes=[2,3,5,7,11,13];
      for(const p of smallPrimes){
        while(tmp%p===0){
          divHistory.push({num:tmp,div:p,result:tmp/p});
          tmp=tmp/p;
        }
        if(tmp===1)break;
      }
      // 소인수분해 결과 문자열
      const factorMap={};
      divHistory.forEach(d=>{factorMap[d.div]=(factorMap[d.div]||0)+1;});
      const ans=Object.entries(factorMap).sort((a,b)=>Number(a[0])-Number(b[0])).map(([p,e])=>e>1?`${p}^${e}`:String(p)).join(' × ');
      // 단계별 풀이
      const steps=[
        {title:'나눗셈 시작',calc:`${n}`,desc:`${n}을 가장 작은 소수부터 차례로 나눕니다.`},
        ...divHistory.map((d,i)=>({
          title:`${i+1}번째 나눗셈`,
          calc:`${d.num} ÷ ${d.div} = ${d.result}`,
          desc:`${d.num}은 소수 ${d.div}로 나누어집니다.`
        })),
        {title:'소인수분해 완성',calc:`${n} = ${ans}`,desc:'더 이상 나눌 수 없으므로 완료입니다.'},
      ];
      return {
        question:`${n}을 소인수분해 하세요. (예: 12 = 2² × 3)`,

        steps,
        concept:'소인수분해: 자연수를 소수의 곱으로 나타내는 것. 지수 표기: 2³ = 2×2×2'
      };
    } else if(type===2){
      // 정수의 사칙연산
      const a=rndNZ(-12,12),b=rndNZ(-12,12);

        question:`(${a}) × (${b})를 계산하세요.`,
        answer:`${ans}`,unit:'정수의 곱셈',type:'short',
        steps:[
          {title:'부호 결정',calc:`${a>=0?'+':'-'} × ${b>=0?'+':'-'} = ${ans>=0?'+':'-'}`,desc:'같은 부호끼리 곱하면 양수, 다른 부호끼리 곱하면 음수입니다.'},
          {title:'절댓값 곱하기',calc:`|${a}| × |${b}| = ${Math.abs(a)} × ${Math.abs(b)} = ${Math.abs(ans)}`,desc:'절댓값끼리 곱합니다.'},
          {title:'부호 붙이기',calc:`${ans>=0?'+':''}${ans}`,desc:`결과는 ${ans}입니다.`},
        ],
        concept:'정수의 곱셈: (부호 결정) × (절댓값의 곱)'

    } else if(type===3){

        answer:`${x}`,unit:'일차방정식',type:'short',
        steps:[

        ],
        concept:'일차방정식 ax + b = c  →  x = (c - b) / a'
      };
    } else {

        concept:'사분면: 1(+,+) 2(-,+) 3(-,-) 4(+,-) / 축 위는 사분면 없음'

          {title:'꼭짓점',calc:`꼭짓점: (${h}, ${k})`,desc:`이차함수의 그래프는 꼭짓점 (${h}, ${k})를 지납니다.`},
        ],
        concept:'이차함수 y=a(x-p)²+q의 꼭짓점: (p, q), 축의 방정식: x = p'
      };
    } else if(type===3){
      // 삼각비
      const angles={30:{sin:'1/2',cos:'√3/2',tan:'√3/3'},45:{sin:'√2/2',cos:'√2/2',tan:'1'},60:{sin:'√3/2',cos:'1/2',tan:'√3'}};
      const deg=[30,45,60][rnd(0,2)];
      const fn=['sin','cos','tan'][rnd(0,2)];
      return {
        question:`${deg}°의 ${fn} 값을 구하세요.`,
        answer:angles[deg][fn],unit:'삼각비',type:'short',
        steps:[
          {title:'특수각 삼각비 표',calc:`sin30°=1/2, sin45°=√2/2, sin60°=√3/2`,desc:'30°, 45°, 60°의 삼각비는 외워두면 편리합니다.'},
          {title:'cos 표',calc:`cos30°=√3/2, cos45°=√2/2, cos60°=1/2`,desc:'sin과 cos은 30°↔60°에서 값이 서로 바뀝니다.'},
          {title:'결과',calc:`${fn}${deg}° = ${angles[deg][fn]}`,desc:''},
        ],
        concept:'특수각 삼각비: sin/cos/tan 30°, 45°, 60°는 암기 필수'
      };
    } else {
      // 원
      const r=rnd(3,10);
      return {
        question:`반지름이 ${r}cm인 원의 넓이를 구하세요. (π 사용, 계산값으로 표현)`,
        answer:`${r*r}π`,unit:'원의 넓이',type:'short',
        steps:[
          {title:'원의 넓이 공식',calc:`S = πr²`,desc:'원의 넓이는 반지름의 제곱에 π를 곱합니다.'},
          {title:'값 대입',calc:`S = π × ${r}² = π × ${r*r}`,desc:`반지름 ${r}을 제곱합니다.`},
          {title:'결과',calc:`S = ${r*r}π cm²`,desc:'π를 계산하지 않고 그대로 두어 정확한 값으로 표현합니다.'},
        ],
        concept:'원의 넓이: S = πr²,  원의 둘레: C = 2πr'
      };
    }
  },

  // ════════════════════════════════════════
  // 고등학교
  // ════════════════════════════════════════

  h1: () => {
    const type = rnd(1,4);
    if(type===1){
      // 다항식 전개
      const a=rnd(1,4),b=rnd(1,4);
      const ans=`x² + ${a+b}x + ${a*b}`;
      return {
        question:`(x + ${a})(x + ${b})를 전개하세요.`,
        answer:ans,unit:'다항식',type:'short',
        steps:[
          {title:'분배법칙 적용',calc:`(x+${a})(x+${b}) = x·x + x·${b} + ${a}·x + ${a}·${b}`,desc:'앞 괄호의 각 항을 뒤 괄호의 각 항과 곱합니다.'},
          {title:'동류항 정리',calc:`= x² + ${b}x + ${a}x + ${a*b}`,desc:'x가 있는 항끼리 더합니다.'},
          {title:'결과',calc:`= ${ans}`,desc:`(${a}+${b})=${a+b}, ${a}×${b}=${a*b}`},
        ],
        concept:'(x+a)(x+b) = x² + (a+b)x + ab'
      };
    } else if(type===2){
      // 로그
      const base=rnd(2,4),exp=rnd(2,5);
      const val=Math.pow(base,exp);
      return {
        question:`log${base}(${val})의 값을 구하세요.`,
        answer:`${exp}`,unit:'로그',type:'short',
        steps:[
          {title:'로그의 정의',calc:`log${base}(${val}) = x  ↔  ${base}^x = ${val}`,desc:`log는 "몇 제곱해야 하는가"를 나타냅니다.`},
          {title:`${base}의 거듭제곱`,calc:`${base}^1=${base}, ${base}^2=${base*base}${exp>2?`, ${base}^3=${Math.pow(base,3)}`:''}${exp>3?`, ${base}^4=${Math.pow(base,4)}`:''}${exp>4?`, ${base}^5=${Math.pow(base,5)}`:''}`,desc:`${base}를 몇 번 곱해야 ${val}이 되는지 확인합니다.`},
          {title:'결과',calc:`${base}^${exp} = ${val}이므로 log${base}(${val}) = ${exp}`,desc:''},
        ],
        concept:`log_b(a) = x  ↔  b^x = a  (로그의 정의)`
      };
    } else if(type===3){
      // 등차수열
      const a=rnd(1,10),d=rnd(1,5),n=rnd(5,10);
      const an=a+(n-1)*d;
      const sn=n*(2*a+(n-1)*d)/2;
      return {
        question:`첫째항이 ${a}, 공차가 ${d}인 등차수열의 첫째항부터 ${n}번째항까지의 합을 구하세요.`,
        answer:`${sn}`,unit:'등차수열',type:'short',
        steps:[
          {title:'등차수열 합 공식',calc:`Sₙ = n(2a₁ + (n-1)d) / 2`,desc:'n항까지의 합 공식입니다.'},
          {title:'값 대입',calc:`S${n} = ${n}(2×${a} + (${n}-1)×${d}) / 2`,desc:'첫째항 a₁=${a}, 공차 d=${d}, 항수 n=${n}을 대입합니다.'},
          {title:'계산',calc:`= ${n}(${2*a} + ${(n-1)*d}) / 2 = ${n}×${2*a+(n-1)*d} / 2 = ${sn}`,desc:''},
        ],
        concept:'등차수열 합: Sₙ = n(a₁+aₙ)/2 = n{2a₁+(n-1)d}/2'
      };
    } else {
      // 이차부등식
      const p=rnd(1,4),q=rnd(p+1,7);
      return {
        question:`이차부등식 (x - ${p})(x - ${q}) < 0의 해를 구하세요.`,
        answer:`${p} < x < ${q}`,unit:'이차부등식',type:'short',
        steps:[
          {title:'이차방정식의 근',calc:`x = ${p}, x = ${q}`,desc:`(x-${p})(x-${q}) = 0의 근은 ${p}과 ${q}입니다.`},
          {title:'이차함수 그래프',calc:`y = (x-${p})(x-${q})는 위로 볼록한 포물선`,desc:'최고차항의 계수가 양수이므로 아래로 볼록(U자형)입니다.'},
          {title:'< 0인 구간',calc:`${p} < x < ${q}`,desc:'그래프가 x축 아래에 있는 구간이 해입니다.'},
        ],
        concept:'(x-p)(x-q)<0 (p<q)의 해: p<x<q'
      };
    }
  },

  h2: () => {
    const type = rnd(1,4);
    if(type===1){
      // 삼각함수
      const angles={0:{sin:'0',cos:'1',tan:'0'},30:{sin:'1/2',cos:'√3/2',tan:'√3/3'},45:{sin:'√2/2',cos:'√2/2',tan:'1'},60:{sin:'√3/2',cos:'1/2',tan:'√3'},90:{sin:'1',cos:'0',tan:'정의 안 됨'},180:{sin:'0',cos:'-1',tan:'0'}};
      const deg=[0,30,45,60,90,180][rnd(0,5)];
      const fn=['sin','cos','tan'][rnd(0,2)];
      if(deg===90&&fn==='tan'){return GENERATORS.h2();}
      return {
        question:`${fn}${deg}°의 값을 구하세요.`,
        answer:angles[deg][fn],unit:'삼각함수',type:'short',
        steps:[
          {title:'단위원 이용',calc:`${deg}°에서의 좌표`,desc:'단위원(반지름=1)에서 각도에 따른 좌표로 삼각함수를 정의합니다.'},
          {title:`${deg}°의 위치`,calc:`cos${deg}° = x좌표 = ${angles[deg].cos}, sin${deg}° = y좌표 = ${angles[deg].sin}`,desc:'단위원 위의 점 (cosθ, sinθ)입니다.'},
          {title:'결과',calc:`${fn}${deg}° = ${angles[deg][fn]}`,desc:''},
        ],
        concept:'단위원: (cosθ, sinθ), tanθ = sinθ/cosθ'
      };
    } else if(type===2){
      // 등비수열
      const a=rnd(1,5),r=rnd(2,3),n=rnd(3,7);
      const an=a*Math.pow(r,n-1);
      return {
        question:`첫째항이 ${a}, 공비가 ${r}인 등비수열의 제${n}항을 구하세요.`,
        answer:`${an}`,unit:'등비수열',type:'short',
        steps:[
          {title:'등비수열 일반항 공식',calc:`aₙ = a₁ × r^(n-1)`,desc:'첫째항에 공비를 (n-1)번 곱합니다.'},
          {title:'값 대입',calc:`a${n} = ${a} × ${r}^(${n}-1) = ${a} × ${r}^${n-1}`,desc:''},
          {title:'계산',calc:`${a} × ${Math.pow(r,n-1)} = ${an}`,desc:`${r}^${n-1} = ${Math.pow(r,n-1)}`},
        ],
        concept:'등비수열 일반항: aₙ = a₁rⁿ⁻¹'
      };
    } else if(type===3){
      // 미분
      const a=rnd(1,4),b=rnd(1,4),c=rnd(-5,5);
      return {
        question:`f(x) = ${a}x³ + ${b}x² + ${c}x일 때, f'(x)를 구하세요.`,
        answer:`${3*a}x² + ${2*b}x + ${c}`,unit:'미분',type:'short',
        steps:[
          {title:'거듭제곱 미분 공식',calc:`(xⁿ)' = nxⁿ⁻¹`,desc:'지수를 계수로 내리고 지수에서 1을 뺍니다.'},
          {title:'각 항 미분',calc:`(${a}x³)' = ${3*a}x², (${b}x²)' = ${2*b}x, (${c}x)' = ${c}`,desc:'각 항을 따로 미분합니다.'},
          {title:'결과',calc:`f'(x) = ${3*a}x² + ${2*b}x + ${c}`,desc:'미분한 항들을 더합니다.'},
        ],
        concept:"다항함수 미분: (axⁿ)' = anx^(n-1), 상수의 미분 = 0"
      };
    } else {
      // 수열의 합 Σ
      const n=rnd(4,8);
      const ans=n*(n+1)/2;
      return {
        question:`Σ(k=1 to ${n}) k 의 값을 구하세요.`,
        answer:`${ans}`,unit:'수열의 합',type:'short',
        steps:[
          {title:'공식',calc:`Σk = n(n+1)/2`,desc:'1부터 n까지 자연수의 합 공식입니다.'},
          {title:'대입',calc:`${n}(${n}+1)/2 = ${n}×${n+1}/2`,desc:`n = ${n}을 대입합니다.`},
          {title:'계산',calc:`${n*(n+1)}/2 = ${ans}`,desc:''},
        ],
        concept:'Σk(k=1~n) = n(n+1)/2'
      };
    }
  },

  h3: () => {
    const type = rnd(1,4);
    if(type===1){
      // 정적분
      const a=rnd(1,4),n=rnd(1,3),upper=rnd(2,4),lower=0;
      const ans=a*Math.pow(upper,n+1)/(n+1);
      return {
        question:`∫₀^${upper} ${a}x^${n} dx 를 계산하세요.`,
        answer:`${ans}`,unit:'적분',type:'short',
        steps:[
          {title:'부정적분',calc:`∫${a}x^${n}dx = ${a}/(${n}+1) × x^${n+1} + C = ${a/(n+1)!==Math.floor(a/(n+1))?`${a}/${n+1}`:a/(n+1)}x^${n+1} + C`,desc:'거듭제곱의 적분: ∫xⁿdx = xⁿ⁺¹/(n+1) + C'},
          {title:'정적분 계산',calc:`[${a}/${n+1}×x^${n+1}]₀^${upper}`,desc:'위쪽 한계에 대한 값 - 아래쪽 한계에 대한 값'},
          {title:'결과',calc:`${a/(n+1)}×${upper}^${n+1} - 0 = ${a/(n+1)}×${Math.pow(upper,n+1)} = ${ans}`,desc:''},
        ],
        concept:'정적분 ∫_a^b f(x)dx = F(b) - F(a) (F는 f의 부정적분)'
      };
    } else if(type===2){
      // 조합
      const n=rnd(5,9),r=rnd(2,4);
      const ans=comb(n,r);
      return {
        question:`C(${n},${r}) (₍${n}₎C₍${r}₎)의 값을 구하세요.`,
        answer:`${ans}`,unit:'조합',type:'short',
        steps:[
          {title:'조합 공식',calc:`C(n,r) = n! / (r! × (n-r)!)`,desc:'순서 없이 r개를 고르는 경우의 수입니다.'},
          {title:'값 대입',calc:`C(${n},${r}) = ${n}! / (${r}! × ${n-r}!)`,desc:''},
          {title:'계산',calc:`= ${Array.from({length:r},(_,i)=>n-i).join('×')} / ${Array.from({length:r},(_,i)=>i+1).join('×')} = ${ans}`,desc:'분자와 분모를 약분합니다.'},
        ],
        concept:'C(n,r) = n!/(r!(n-r)!), 순서 무관 선택'
      };
    } else if(type===3){
      // 확률분포 기댓값
      const p=rnd(1,4),total=10;
      const q=total-p;
      const ev=(p*1+q*0)/total;
      return {
        question:`동전 10개 중 앞면이 ${p}개, 뒷면이 ${q}개입니다. 임의로 1개를 골랐을 때 앞면이 나오면 1점, 뒷면이 나오면 0점을 받습니다. 기댓값을 구하세요.`,
        answer:`${p}/${total}`,unit:'확률과 통계',type:'short',
        steps:[
          {title:'확률 구하기',calc:`P(앞면) = ${p}/${total}, P(뒷면) = ${q}/${total}`,desc:'각 사건의 확률을 구합니다.'},
          {title:'기댓값 공식',calc:`E(X) = Σ xᵢP(xᵢ)`,desc:'각 결과값과 그 확률의 곱을 모두 더합니다.'},
          {title:'계산',calc:`E(X) = 1×${p}/${total} + 0×${q}/${total} = ${p}/${total}`,desc:''},
        ],
        concept:'기댓값 E(X) = Σ xᵢP(xᵢ)'
      };
    } else {
      // 극한
      const a=rnd(1,4),b=rnd(1,4);
      return {
        question:`lim(x→∞) (${a}x² + ${b}x) / (${b}x² + ${a}) 의 값을 구하세요.`,
        answer:`${a}/${b}`,unit:'극한',type:'short',
        steps:[
          {title:'최고차항으로 나누기',calc:`분자, 분모를 x²으로 나눕니다.`,desc:'∞/∞ 꼴에서는 최고차항으로 분자, 분모를 나눕니다.'},
          {title:'변환',calc:`(${a} + ${b}/x) / (${b} + ${a}/x²)`,desc:'x→∞이면 1/x→0, 1/x²→0입니다.'},
          {title:'극한값',calc:`= (${a} + 0) / (${b} + 0) = ${a}/${b}`,desc:''},
        ],
        concept:'∞/∞ 꼴 극한: 최고차항으로 나누면 나머지 항→0'
      };
    }
  },
};

function makeOptions(ans, wrongGen, n=3){
  const s=new Set([String(ans)]);
  const ws=[];
  for(let i=0;i<60&&ws.length<n;i++){
    const w=String(wrongGen(i));
    if(!s.has(w)){s.add(w);ws.push(w);}
  }
  return ws.slice(0,n);
}

// ── 인증 ──────────────────────────────────────────────────────────
async function initAuth(){
  const params=new URLSearchParams(location.search);
  const token=params.get('token');
  if(token){authToken=token;localStorage.setItem('auth_token',token);history.replaceState({},'',location.pathname);}
  if(params.get('error'))showToast('로그인 실패');
  if(authToken){
    await fetchMe();
  }else{
    updateStats();
  }
  renderAuthArea();
}

async function fetchMe(){
  if(!authToken)return;
  try{
    const res=await fetch(`${API}/api/me`,{headers:{Authorization:`Bearer ${authToken}`}});
    const data=await res.json();

    // 밴 체크
    if(data.banned){
      document.getElementById('ban-overlay').style.display='flex';
      document.getElementById('ban-overlay-reason').textContent=`사유: ${data.reason}`;
      return;
    }

    currentUser=data.user||null;
    if(currentUser){
      // DB에서 가져온 누적 통계 반영
      score=currentUser.totalScore||0;
      correct=currentUser.totalCorrect||0;
      total=currentUser.totalAnswered||0;
      streak=currentUser.bestStreak||0;
      updateStats();
      renderAuthArea();
      checkAdminTab();
    }
  }catch(e){currentUser=null;}
}



function renderAuthArea(){
  const area=document.getElementById('auth-area');
  if(!area)return;
  if(currentUser){
    const initial=currentUser.name?currentUser.name[0]:'?';
    area.innerHTML=`<div class="user-chip" title="${currentUser.name}">
      ${currentUser.avatar?`<img src="${currentUser.avatar}" alt="">`:`<div style="width:24px;height:24px;border-radius:50%;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;">${initial}</div>`}
      <span>${currentUser.name}</span>
    </div>`;
  }else{
    area.innerHTML=`<button class="login-btn" onclick="location.href='${API}/api/auth/google'">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      구글 로그인
    </button>`;
  }
}

async function saveResult(grade,score,correct,total,maxStreak){
  if(!authToken||!currentUser)return;
  try{
    await fetch(`${API}/api/result`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},
      body:JSON.stringify({grade,score,correct,total,maxStreak}),
    });
  }catch(e){}
}

function showTab(name){
  ['quiz','ranking','profile','admin'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el)el.style.display='none';
  });
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('tab-'+name);
  if(el)el.style.display='block';
  const idx={quiz:0,ranking:1,profile:2,admin:3}[name];
  const btns=document.querySelectorAll('.tab-btn');
  if(btns[idx])btns[idx].classList.add('active');
  if(name==='ranking')loadRanking();
  if(name==='profile')renderProfile();
  if(name==='admin')loadAdminPanel();
  // 퀴즈 탭에서만 stats 보이게
  document.querySelector('.stats-banner').style.display=name==='quiz'?'flex':'none';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── 랭킹 ─────────────────────────────────────────────────────────
async function loadRanking(){
  const list=document.getElementById('ranking-list');
  list.innerHTML='<div class="empty-ranking">불러오는 중…</div>';
  try{
    const res=await fetch(`${API}/api/ranking`,{headers:{Authorization:`Bearer ${authToken||''}`}});
    const data=await res.json();
    if(!data.ranking||data.ranking.length===0){
      list.innerHTML='<div class="empty-ranking">아직 기록이 없어요!<br>첫 번째 랭커가 되어보세요 🏆</div>';
      return;
    }
    list.innerHTML='';
    data.ranking.forEach((u,i)=>{
      const numClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const isMe=currentUser&&u.name===currentUser.name;
      const initial=u.name?u.name[0]:'?';
      const acc=u.total_answered>0?Math.round(u.total_correct/u.total_answered*100):0;
      list.innerHTML+=`<div class="rank-card${isMe?' me':''}">
        <span class="rank-num ${numClass}">${i+1}</span>
        ${u.avatar?`<img class="rank-avatar" src="${u.avatar}">`:`<div class="rank-avatar-placeholder">${initial}</div>`}
        <div class="rank-info">
          <div class="rank-name">${u.name}${isMe?' (나)':''}</div>
          <div class="rank-stats">정답률 ${acc}% · 최고연속 ${u.best_streak}🔥</div>
        </div>
        <span class="rank-score">${u.total_score.toLocaleString()}</span>
      </div>`;
    });
  }catch(e){list.innerHTML='<div class="empty-ranking">랭킹을 불러오지 못했어요.</div>';}
}

  }
  const acc=currentUser.totalAnswered>0?Math.round(currentUser.totalCorrect/currentUser.totalAnswered*100):0;
  const initial=currentUser.name?currentUser.name[0]:'?';
  const recs=[...(currentUser.records||[])].slice(0,10);

  recs.forEach(r=>{

      <div class="profile-email">${currentUser.email||''}</div>

        <div class="profile-stat"><div class="profile-stat-val">${currentUser.totalScore.toLocaleString()}</div><div class="profile-stat-label">누적 점수</div></div>
        <div class="profile-stat"><div class="profile-stat-val">${acc}%</div><div class="profile-stat-label">정답률</div></div>
        <div class="profile-stat"><div class="profile-stat-val">${currentUser.bestStreak}🔥</div><div class="profile-stat-label">최고 연속</div></div>
      </div>
    </div>
    ${recs.length>0?`<div class="records-title">최근 기록</div>${recordsHtml}`:''}
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  `;
}


// ── 관리자 ────────────────────────────────────────────────────────
const ADMIN_EMAIL = 'kmimseo1203@gmail.com';

function isAdmin(){return currentUser&&currentUser.email===ADMIN_EMAIL;}

function checkAdminTab(){
  const btn=document.getElementById('admin-tab-btn');
  if(btn)btn.style.display=isAdmin()?'block':'none';

async function loadAdminPanel(){

  const list=document.getElementById('admin-user-list');
  list.innerHTML='<div class="empty-ranking">불러오는 중…</div>';
  try{
    const res=await fetch(`${API}/api/admin/users`,{headers:{Authorization:`Bearer ${authToken}`}});

// ── 밴 관리 ──────────────────────────────────────────────────────
let banTargetId = null;

function openBanModal(userId, userName){
  banTargetId = userId;
  document.getElementById('ban-target-name').textContent = userName;
  document.getElementById('ban-reason').value = '';
  document.getElementById('ban-type').value = 'permanent';
  document.getElementById('ban-duration').style.display = 'none';
  document.getElementById('ban-modal').style.display = 'flex';
}

function closeBanModal(){
  document.getElementById('ban-modal').style.display = 'none';
  banTargetId = null;
}

function toggleDuration(){
  const type = document.getElementById('ban-type').value;
  document.getElementById('ban-duration').style.display = type === 'temp' ? 'block' : 'none';
}

async function submitBan(){
  if(!banTargetId) return;
  const reason = document.getElementById('ban-reason').value.trim();
  const ban_type = document.getElementById('ban-type').value;
  const duration_hours = ban_type === 'temp' ? parseInt(document.getElementById('ban-duration').value) : null;
  if(!reason){showToast('사유를 입력하세요');return;}
  if(ban_type === 'temp' && (!duration_hours || duration_hours < 1)){showToast('시간을 입력하세요');return;}

  try{
    const res = await fetch(`${API}/api/admin/ban`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${authToken}`},
      body: JSON.stringify({ user_id: banTargetId, reason, ban_type, duration_hours }),
    });
    const data = await res.json();
    if(data.ok){
      showToast('밴 완료!');
      closeBanModal();
      loadAdminPanel();
    }
  }catch(e){showToast('오류 발생');}
}

async function unban(banId){
  try{
    const res = await fetch(`${API}/api/admin/ban`, {
      method: 'DELETE',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${authToken}`},
      body: JSON.stringify({ id: banId }),
    });
    const data = await res.json();
    if(data.ok){showToast('밴 해제!');loadAdminPanel();}
  }catch(e){showToast('오류 발생');}
}

function logout(){
  authToken=null;currentUser=null;
  localStorage.removeItem('auth_token');
  score=0;streak=0;total=0;correct=0;
  updateStats();
  renderAuthArea();
  showTab('quiz');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startQuiz(){document.getElementById('setup-screen').style.display='none';document.getElementById('quiz-screen').style.display='block';document.getElementById('nav-back').style.visibility='visible';loadQuestion();}
function goSetup(){document.getElementById('setup-screen').style.display='block';document.getElementById('quiz-screen').style.display='none';document.getElementById('nav-back').style.visibility='hidden';}

function loadQuestion(){
  qNum++;
  document.getElementById('question-card').className='question-card';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('options-list').innerHTML='';
  document.getElementById('input-row').style.display='none';
  document.getElementById('sym-pad').classList.remove('show');
  const ai=document.getElementById('ans-input');
  ai.value='';ai.className='ans-input';ai.disabled=false;
  document.getElementById('confirm-btn').disabled=false;
  document.getElementById('q-num').textContent=qNum;
  document.getElementById('question-text').textContent='';

  const arr=[...selected];
  const gid=arr[rnd(0,arr.length-1)];
  const g=GRADES.find(x=>x.id===gid);
  const q=GENERATORS[gid]();

  document.getElementById('q-grade').textContent=g.label;
  document.getElementById('q-unit').textContent=q.unit;
  document.getElementById('question-text').textContent=q.question;
  curFeedback=q;
  curAnswer=String(q.answer).trim();

  // 답이 숫자면 4지선다, 아니면 단답형
  const isNumeric=!isNaN(parseFloat(q.answer))&&String(q.answer).match(/^-?\d+(\.\d+)?$/);
  curType=isNumeric?'mcq':'short';

  if(curType==='mcq'){
    const ansNum=parseFloat(q.answer);
    const wrongs=makeOptions(q.answer,i=>{
      const deltas=[1,2,3,5,10,-1,-2,-3,-5,-10,0.5,-0.5,2.5,-2.5];
      return String(Math.round((ansNum+deltas[i%deltas.length])*100)/100);
    });
    const opts=shuffle([q.answer,...wrongs]);
    const correctIdx=opts.indexOf(q.answer);
    const list=document.getElementById('options-list');
    opts.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.innerHTML=`<span class="num">${i+1}</span><span>${opt}</span>`;
      btn.onclick=()=>pickOpt(i,correctIdx,btn,opts);
      list.appendChild(btn);
    });
  } else {
    document.getElementById('input-row').style.display='flex';
    document.getElementById('sym-pad').classList.add('show');
    const ai=document.getElementById('ans-input');
    ai.focus();
    ai.onkeydown=e=>{if(e.key==='Enter')submitAnswer();};
  }
}

function pickOpt(idx,correctIdx,btn,opts){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ok=idx===correctIdx;total++;
  btn.className='opt-btn '+(ok?'sel-correct':'sel-wrong');
  if(!ok)document.querySelectorAll('.opt-btn')[correctIdx].className='opt-btn show-correct';
  resolve(ok,opts[correctIdx]);
}


function insSymbol(s){
  const ai=document.getElementById('ans-input');
  const start=ai.selectionStart,end=ai.selectionEnd;
  ai.value=ai.value.slice(0,start)+s+ai.value.slice(end);
  ai.selectionStart=ai.selectionEnd=start+s.length;
  ai.focus();
}
function delSymbol(){
  const ai=document.getElementById('ans-input');
  const start=ai.selectionStart;
  if(start>0){ai.value=ai.value.slice(0,start-1)+ai.value.slice(start);ai.selectionStart=ai.selectionEnd=start-1;}
  ai.focus();
}
function submitAnswer(){
  const ai=document.getElementById('ans-input');
  const val=ai.value.trim();if(!val)return;
  ai.disabled=true;document.getElementById('confirm-btn').disabled=true;total++;
  // 정답 비교: 표기 방식 통일 후 비교
  function normalizeAns(s){
    return s.trim()
      .replace(/\s+/g,'')           // 공백 제거
      .replace(/×/g,'*')            // × → *
      .replace(/²/g,'^2')           // ² → ^2
      .replace(/³/g,'^3')           // ³ → ^3
      .replace(/⁴/g,'^4')           // ⁴ → ^4
      .toLowerCase();
  }
  const ok=normalizeAns(val)===normalizeAns(curAnswer)||(!isNaN(parseFloat(val))&&Math.abs(parseFloat(val)-parseFloat(curAnswer))<0.01);
  ai.className='ans-input '+(ok?'correct':'wrong');
  resolve(ok,curAnswer);
}

function resolve(ok,correctText){
  if(ok){correct++;streak++;score+=Math.max(10,10*streak);if(streak>=3)showToast(`🔥 ${streak}연속 정답!`);}
  else{streak=0;}
  document.getElementById('question-card').className='question-card '+(ok?'correct':'wrong');

  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'correct':'wrong')+' show';

  const q=curFeedback;
  const stepsHtml=(q.steps||[]).map((s,i)=>`
    <div class="step">
      <span class="step-num">${i+1}</span>
      <div class="step-body">
        ${s.title?`<div class="step-title">${s.title}</div>`:''}
        ${s.calc?`<div class="step-calc">${s.calc}</div>`:''}
        ${s.desc?`<div class="step-desc">${s.desc}</div>`:''}
      </div>
    </div>`).join('');

  fb.innerHTML=`
    <div class="feedback-top">${ok?'✅ 정답이에요!':'❌ 틀렸어요'}</div>
    ${!ok?`<div class="feedback-answer">정답: ${correctText}</div>`:''}
    ${stepsHtml?`<div class="steps">${stepsHtml}</div>`:''}
    ${q.concept?`<div class="concept-box"><div class="concept-label">핵심 개념</div><div class="concept-text">${q.concept}</div></div>`:''}
  `;

  updateStats();
  document.getElementById('next-btn').style.display='block';
  // 이번 문제 점수만 저장 (누적X)
  const thisScore=ok?Math.max(10,10*streak):0;
  const thisCorrect=ok?1:0;
  if(currentUser&&curFeedback)saveResult(curFeedback.unit,thisScore,thisCorrect,1,streak);
}

initAuth();
</script>
